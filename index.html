<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BLB Johannisthal</title>

  <style>
    :root {
      --primary: #0f3b78;   /* falls Logo-Blau → kann angepasst werden */
      --bg: #f6f8fb;
      --white: #ffffff;
      --text: #1c2430;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 600px;
      padding: 40px 20px;
      text-align: center;
    }

    .logo {
      margin-bottom: 20px;
    }

    .logo img {
      width: 100px;
      height: auto;
    }

    h1 {
      margin: 10px 0 30px;
      font-size: 28px;
      color: var(--primary);
    }

    .card {
      background: var(--white);
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.06);
      margin-bottom: 20px;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 20px;
      color: var(--primary);
    }

    .card p {
      margin: 0 0 20px;
      font-size: 15px;
      color: #555;
    }

    .btn {
      display: inline-block;
      background: var(--primary);
      color: white;
      padding: 12px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    .btn.secondary {
      background: transparent;
      color: var(--primary);
      border: 2px solid var(--primary);
    }

    @media (max-width: 500px) {
      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="logo">
      <img src="logo.svg" alt="BLB Logo">
    </div>

    <h1>BLB Johannisthal</h1>

    <div class="card">
      <h2>Belege hochladen</h2>
      <p>Unterlagen direkt sicher über das Portal einreichen.</p>
      <a class="btn" href="https://cloud.blb-johannisthal.de">Zum Upload</a>
    </div>

    <div class="card">
      <h2>Formulare & Checklisten</h2>
      <p>Wichtige Dokumente und Vorlagen.</p>
      <a class="btn secondary" href="#">Öffnen</a>
    </div>

    <div class="card">
      <h2>Terminvereinbarung</h2>
      <p>Online-Termine werden in Kürze verfügbar sein.</p>
      <a class="btn secondary" href="#">Demnächst</a>
    </div>

  </div>

</body>
</html>
